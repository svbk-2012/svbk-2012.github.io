<html>
  <!-- Ultimate Game Stash file-->
  <!-- Phoenix Wright - Ace Attorney - Justice for All (USA) -->
  <head>
    <script src="//www.google.com/jsapi"></script>
    <script>
      window.parent.maeExportApis_();
    </script>
    <style>
      body {
        overflow: hidden;
        background: #000000;
        margin-top: 0;
        margin-left: 0;
        color: #000000;
      }
      #startButton {
        display: block;
        width: 160px;
        height: 40px;
        background-color: #c0392b;
        color: white;
        text-align: center;
        text-decoration: none;
        font-size: 16px;
        margin: 20px auto;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Press Start 2P", cursive;
        box-shadow: 0px 0px 10px 2px #000000;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style type="text/css">
      #button {
        display: none;
      }
      .imgb_vis {
        animation: imgb-animation 7s linear;
      }
      @keyframes imgb-animation {
        10% { transform: translateX(0); }
        20% { transform: translateX(100px); }
        90% { transform: translateX(100px); }
        100% { transform: translateX(0); }
      }

      /* Pointer-lock hint */
      #pointer-lock-hint {
        display: none;
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 20px;
        pointer-events: none;
        z-index: 9999;
        white-space: nowrap;
        font-family: Arial, sans-serif;
      }
      #pointer-lock-hint.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div style="width: 100vw; height: 100vh; max-width: 100%">
      <div id="game" style="display: none"></div>
      <button id="startButton">PLAY</button>
    </div>

    <div id="pointer-lock-hint">Press Esc to release cursor</div>

    <script>
      // Intercept every iframe EmulatorJS creates and inject
      // allow-pointer-lock into its sandbox before it is attached
      const _origCreate = document.createElement.bind(document);
      document.createElement = function (tag) {
        const el = _origCreate(tag);
        if (tag.toLowerCase() === "iframe") {
          new MutationObserver(() => {
            const sb = el.getAttribute("sandbox");
            if (sb !== null && !sb.includes("allow-pointer-lock")) {
              el.setAttribute("sandbox", sb + " allow-pointer-lock");
            }
          }).observe(el, { attributes: true, attributeFilter: ["sandbox"] });
        }
        return el;
      };
    </script>

    <script>
      document.getElementById("game").style.display = "none";

      function startGame() {
        document.getElementById("game").style.display = "block";
        document.getElementById("startButton").style.display = "none";

        EJS_player        = "#game";
        EJS_core          = "nds";
        EJS_color         = "#c0392b";
        EJS_startOnLoaded = true;
        EJS_pathtodata    = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";
        EJS_gameUrl       = "./Phoenix Wright - Ace Attorney - Justice for All (USA).nds";

        loadGame();

        // Pointer-lock hint
        const hint = document.getElementById("pointer-lock-hint");
        document.addEventListener("pointerlockchange", () => {
          hint.classList.toggle("visible", !!document.pointerLockElement);
        });
        document.addEventListener("mozpointerlockchange", () => {
          hint.classList.toggle("visible", !!document.mozPointerLockElement);
        });
      }

      document.getElementById("startButton").addEventListener("click", startGame);

      function loadGame() {
        var script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
